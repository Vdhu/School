<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гродно 40 - Интерактив</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
    #main_bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('https://planetabelarus.by/upload/iblock/fe9/50cl73ugx9a8i3eqggza4do0epoh5mc8.webp');
        background-size: cover; background-position: center;
        transition: background-image 1s ease-in-out; z-index: -1;
    }
    .shirm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 0; }
    .knopki {
        position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 8px; z-index: 10;
    }
    .btn {
        background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3);
        color: white; padding: 12px 20px; cursor: pointer; width: 220px;
        text-align: left; border-radius: 5px; font-size: 15px; transition: 0.3s;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.4); transform: translateX(10px); border-color: #ffd700; }
    .opisanie {
        position: absolute; right: 20px; bottom: 20px; width: 320px;
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
        color: white; padding: 25px; border-radius: 12px; z-index: 10;
        border-right: 4px solid #ffd700; transition: 0.5s;
    }
    h2 { margin: 0 0 10px 0; color: #ffd700; font-size: 22px; }
    p { font-size: 15px; line-height: 1.6; margin: 0; opacity: 0.9; }
    .avtor { position: absolute; top: 15px; left: 20px; color: white; font-size: 12px; opacity: 0.5; z-index: 10; }
</style>
</head>
<body>
<div id="main_bg"></div>
<div class="shirm"></div>
<div class="avtor">СШ №40 г. Гродно</div>
<div class="knopki">
    <button class="btn" onmouseover="smotret('z')">🏰 Старый замок</button>
    <button class="btn" onmouseover="smotret('nz')">👑 Новый замок</button>
    <button class="btn" onmouseover="smotret('k')">⛪ Коложская церковь</button>
    <button class="btn" onmouseover="smotret('f')">⛪ Фарный костел</button>
    <button class="btn" onmouseover="smotret('t')">🎭 Драмтеатр</button>
    <button class="btn" onmouseover="smotret('s')">✡️ Синагога</button>
    <button class="btn" onmouseover="smotret('pk')">🚒 Пожарная каланча</button>
    <button class="btn" onmouseover="smotret('a')">💊 Аптека-музей</button>
</div>
<div class="opisanie">
    <div id="info">
        <h2>Гродно</h2>
        <p>Наведи на список слева, чтобы изучить легендарные места королевского города.</p>
    </div>
</div>
<script>
    var places = {
        z: {
            t: "Старый замок",
            d: "Главная резиденция королей. Возведен в 14 веке, пережил десятки осад и сейчас восстановлен в облике эпохи Стефана Батория. Внутри находятся уникальные музейные экспозиции.",
            i: "https://planetabelarus.by/upload/iblock/fe9/50cl73ugx9a8i3eqggza4do0epoh5mc8.webp"
        },
        nz: {
            t: "Новый замок",
            d: "Королевский дворец в стиле рококо, построенный прямо напротив Старого замка. Здесь проходили важные сеймы Речи Посполитой и решалась судьба европейской истории.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Hrodna_New_Castle_01.jpg/1280px-Hrodna_New_Castle_01.jpg"
        },
        k: {
            t: "Коложская церковь",
            d: "Один из древнейших памятников православия в Восточной Европе (12 век). Уникальна своей кладкой из майолики и тем, что половина храма осталась деревянной после оползня.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Kalozha_Church_Hrodna_2021.jpg/1280px-Kalozha_Church_Hrodna_2021.jpg"
        },
        f: {
            t: "Фарный костел",
            d: "Собор Святого Франциска Ксаверия. Его алтарь — один из самых высоких в Европе (21 метр), а башенные часы старше пражских курантов.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Hrodna_Cathedral_2021.jpg/1280px-Hrodna_Cathedral_2021.jpg"
        },
        t: {
            t: "Драмтеатр",
            d: "Футуристичное здание, напоминающее корону. Построено в 80-х годах и стало главным символом Гродно. Отсюда открывается лучший вид на Неман.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Grodno_Drama_Theatre_01.jpg/1280px-Grodno_Drama_Theatre_01.jpg"
        },
        s: {
            t: "Большая Хоральная Синагога",
            d: "Одна из старейших и красивейших в Европе. Внутри работает музей, посвященный истории еврейской общины города, которая когда-то составляла половину населения Гродно.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Hrodna_Great_Synagogue_2021.jpg/1280px-Hrodna_Great_Synagogue_2021.jpg"
        },
        pk: {
            t: "Пожарная каланча",
            d: "Действующая пожарная часть с 32-метровой башней. На её фреске изображена девушка, удивительно похожая на Мону Лизу в пожарной форме.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Hrodna_Fire_Tower_2021.jpg/1280px-Hrodna_Fire_Tower_2021.jpg"
        },
        a: {
            t: "Аптека-музей",
            d: "Расположена в здании 1709 года. Это самая старая действующая аптека в стране, где сохранились алхимические лаборатории и старинные рецепты.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Old_Pharmacy_Grodno.jpg/1280px-Old_Pharmacy_Grodno.jpg"
        }
    };

    function smotret(id) {
        var x = places[id];
        document.getElementById('main_bg').style.backgroundImage = "url('" + x.i + "')";
        document.getElementById('info').style.opacity = 0;
        setTimeout(function() {
            document.getElementById('info').innerHTML = "<h2>" + x.t + "</h2><p>" + x.d + "</p>";
            document.getElementById('info').style.opacity = 1;
        }, 300);
    }
</script>
</body>
</html>
