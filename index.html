<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Путеводитель Гродно</title>
<style>
    body, html {
        margin: 0; padding: 0;
        height: 100%; overflow: hidden;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    #bg {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Hrodna_Old_Castle_2021.jpg/1280px-Hrodna_Old_Castle_2021.jpg');
        background-size: cover;
        background-position: center;
        transition: 0.6s;
        z-index: -1;
    }

    .dark {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        z-index: 0;
    }

    .btns {
        position: absolute;
        left: 30px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column;
        gap: 12px; z-index: 5;
    }

    .b {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.3);
        color: white; padding: 18px;
        cursor: pointer; width: 220px;
        text-align: left; font-size: 16px;
        border-radius: 10px; transition: 0.2s;
    }

    .b:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.03); }

    .info {
        position: absolute;
        right: 30px; top: 50%;
        transform: translateY(-50%);
        width: 320px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: white; padding: 25px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 5;
    }

    h1 { margin: 0 0 15px 0; color: #f1c40f; font-size: 26px; }
    p { line-height: 1.6; margin: 0; font-size: 17px; }

    .shkola {
        position: absolute; bottom: 20px; left: 30px;
        color: rgba(255,255,255,0.6); font-size: 13px; z-index: 5;
    }
</style>
</head>
<body>

<div id="bg"></div>
<div class="dark"></div>

<div class="btns">
    <button class="b" onclick="pereklyuch('z')">🏰 Старый замок</button>
    <button class="b" onclick="pereklyuch('k')">⛪ Коложская церковь</button>
    <button class="b" onclick="pereklyuch('f')">⛪ Фарный костел</button>
    <button class="b" onclick="pereklyuch('t')">🎭 Драмтеатр</button>
    <button class="b" onclick="pereklyuch('a')">💊 Аптека-музей</button>
</div>

<div class="info">
    <div id="txt">
        <h1>Гродно 40</h1>
        <p>Выбирай интересное место слева. Весь культурный облик города на одном экране.</p>
    </div>
</div>

<div class="shkola">Сделано в СШ №40 г. Гродно</div>

<script>
    const base = {
        z: {
            n: "Старый замок",
            o: "Это королевский дворец на горе. Сейчас его восстановили как при короле Стефане Батории. Очень массивное и красивое здание прямо над Неманом.",
            p: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Hrodna_Old_Castle_2021.jpg/1280px-Hrodna_Old_Castle_2021.jpg"
        },
        k: {
            n: "Коложская церковь",
            o: "Древнейший храм, 12 век. Стены украшены камнями и плиткой. Она стоит на высоком берегу, откуда открывается отличный вид на город.",
            p: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Kalozha_Church_Hrodna_2021.jpg/1280px-Kalozha_Church_Hrodna_2021.jpg"
        },
        f: {
            n: "Фарный костел",
            o: "Главный храм на центральной площади. Внутри невероятно красивый алтарь из дерева и старинные башенные часы. Один из символов Гродно.",
            p: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Hrodna_Cathedral_2021.jpg/1280px-Hrodna_Cathedral_2021.jpg"
        },
        t: {
            n: "Драмтеатр",
            o: "Здание очень необычное, в стиле модерн. Многие говорят, что оно похоже на корону. Вечером там включается красивая подсветка.",
            p: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Grodno_Drama_Theatre_01.jpg/1280px-Grodno_Drama_Theatre_01.jpg"
        },
        a: {
            n: "Аптека-музей",
            o: "Самая старая работающая аптека. Там можно бесплатно посмотреть старинные инструменты врачей, банки с травами и рецепты прошлых веков.",
            p: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Old_Pharmacy_Grodno.jpg/1280px-Old_Pharmacy_Grodno.jpg"
        }
    };

    function pereklyuch(key) {
        var item = base[key];
        
        // фон меняем
        document.getElementById('bg').style.backgroundImage = "url('" + item.p + "')";
        
        // текст меняем
        var div = document.getElementById('txt');
        div.innerHTML = "<h1>" + item.n + "</h1><p>" + item.o + "</p>";
    }
</script>

</body>
</html>
