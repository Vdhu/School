<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Путеводитель Гродно - СШ 40</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Главный фон на весь экран */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://vgr.by/wp-content/uploads/2021/11/staryj-zamok-grodno.jpg');
            background-size: cover;
            background-position: center;
            transition: 0.5s;
            z-index: -1;
        }

        /* Слой для затемнения чтобы текст читался */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 0;
        }

        /* Кнопки слева */
        .menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            text-align: left;
            width: 200px;
            font-size: 16px;
            transition: 0.3s;
            border-radius: 5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Описание справа */
        .info-box {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            color: white;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }

        h1 { margin-top: 0; font-size: 24px; color: #ffd700; }
        p { line-height: 1.5; font-size: 17px; }

        .school-mark {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.7;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div class="overlay"></div>

<div class="menu">
    <button class="btn" onclick="show('zamok')">🏰 Старый замок</button>
    <button class="btn" onclick="show('kolozha')">⛪ Коложская церковь</button>
    <button class="btn" onclick="show('farny')">⛪ Фарный костел</button>
    <button class="btn" onclick="show('teatr')">🎭 Драмтеатр</button>
    <button class="btn" onclick="show('apteka')">💊 Аптека-музей</button>
</div>

<div class="info-box">
    <div id="content">
        <h1>Гродно</h1>
        <p>Нажми на любой объект слева, чтобы начать прогулку по городу.</p>
    </div>
</div>

<div class="school-mark">Выполнил ученик СШ №40 г. Гродно</div>

<script>
    const items = {
        zamok: {
            t: "Старый замок",
            d: "Это главная крепость города. Недавно его сильно обновили, теперь он выглядит как в 16 веке. Внутри очень крутой музей.",
            img: "https://vgr.by/wp-content/uploads/2021/11/staryj-zamok-grodno.jpg"
        },
        kolozha: {
            t: "Коложская церковь",
            d: "Самая старая церковь в городе, построена еще в 12 веке. У нее одна стена каменная, а другая деревянная. Очень необычное место.",
            img: "https://planetabelarus.by/upload/resize_cache/iblock/785/1330_887_17f5c53143f254924c03d4b6842795c6a/7858f964a755106606020c660633b664.jpg"
        },
        farny: {
            t: "Фарный костел",
            d: "Находится в самом центре на площади. Там стоят уникальные деревянные алтари и старинные часы, которые до сих пор ходят.",
            img: "https://grodnonews.by/upload/resize_cache/iblock/14d/1200_800_1/14da767098f98d415750d061f2518e3a.jpg"
        },
        teatr: {
            t: "Драмтеатр",
            d: "Здание необычной формы, его называют символом Гродно. Похоже на корону или какой-то космический корабль.",
            img: "https://vgr.by/wp-content/uploads/2020/08/dramteatr-grodno.jpg"
        },
        apteka: {
            t: "Аптека-музей",
            d: "Самая старая аптека в Беларуси. Там можно посмотреть на древние лекарства и всякие штуки, которыми лечили людей раньше.",
            img: "https://grodno.in/images/news/2021/04/aptheka_3.jpg"
        }
    };

    function show(id) {
        const obj = items[id];
        
        // меняем картинку фона
        document.getElementById('bg-image').style.backgroundImage = "url('" + obj.img + "')";
        
        // меняем текст
        document.getElementById('content').innerHTML = "<h1>" + obj.t + "</h1><p>" + obj.d + "</p>";
    }
</script>

</body>
</html>
