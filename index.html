<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Гродно 40 - Тест</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
    
    /* Фон на весь экран */
    #main_bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('https://planetabelarus.by/upload/iblock/fe9/50cl73ugx9a8i3eqggza4do0epoh5mc8.webp');
        background-size: cover; background-position: center;
        transition: 0.5s; z-index: -1;
    }

    .shirm {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.3); z-index: 0;
    }

    /* Кнопки слева */
    .knopki {
        position: absolute; left: 25px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 10px; z-index: 10;
    }

    .btn {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.4);
        color: white; padding: 15px;
        cursor: pointer; width: 210px;
        text-align: left; border-radius: 8px; font-size: 16px;
    }

    .btn:hover { background: rgba(255, 255, 255, 0.3); }

    /* Описание справа */
    .opisanie {
        position: absolute; right: 25px; top: 50%;
        transform: translateY(-50%); width: 300px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
        color: white; padding: 25px;
        border-radius: 15px; z-index: 10;
    }

    h2 { margin: 0 0 10px 0; color: #ffd700; }
    p { font-size: 16px; line-height: 1.4; }

    .avtor {
        position: absolute; bottom: 15px; left: 25px;
        color: white; font-size: 12px; opacity: 0.6; z-index: 10;
    }
</style>
</head>
<body>

<div id="main_bg"></div>
<div class="shirm"></div>

<div class="knopki">
    <button class="btn" onclick="smotret('z')">🏰 Старый замок</button>
    <button class="btn" onclick="smotret('k')">⛪ Коложская церковь</button>
    <button class="btn" onclick="smotret('f')">⛪ Фарный костел</button>
    <button class="btn" onclick="smotret('t')">🎭 Драмтеатр</button>
    <button class="btn" onclick="smotret('a')">💊 Аптека-музей</button>
</div>

<div class="opisanie">
    <div id="info">
        <h2>Гродно</h2>
        <p>Выбирай место слева, чтобы посмотреть фото и описание.</p>
    </div>
</div>

<div class="avtor">Сделано в СШ №40 г. Гродно</div>

<script>
    var places = {
        z: {
            t: "Старый замок",
            d: "Самая старая крепость Гродно. Сейчас замок выглядит как настоящий королевский дворец после большой реставрации.",
            i: "https://planetabelarus.by/upload/iblock/fe9/50cl73ugx9a8i3eqggza4do0epoh5mc8.webp"
        },
        k: {
            t: "Коложская церковь",
            d: "Уникальный храм 12 века. Стоит на высоком берегу Немана. Одна стена у нее каменная, а другая деревянная.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Kalozha_Church_Hrodna_2021.jpg/1280px-Kalozha_Church_Hrodna_2021.jpg"
        },
        f: {
            t: "Фарный костел",
            d: "Центральный собор Гродно. Внутри стоит огромный алтарь, а на башне — самые старые часы в Европе.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Hrodna_Cathedral_2021.jpg/1280px-Hrodna_Cathedral_2021.jpg"
        },
        t: {
            t: "Драмтеатр",
            d: "Очень известное здание, которое похоже на корону. Символ современного Гродно.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Grodno_Drama_Theatre_01.jpg/1280px-Grodno_Drama_Theatre_01.jpg"
        },
        a: {
            t: "Аптека-музей",
            d: "Старинная аптека, где можно увидеть, как лечили людей сотни лет назад. Находится прямо на площади.",
            i: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Old_Pharmacy_Grodno.jpg/1280px-Old_Pharmacy_Grodno.jpg"
        }
    };

    function smotret(id) {
        var x = places[id];
        // меняем фон
        document.getElementById('main_bg').style.backgroundImage = "url('" + x.i + "')";
        // меняем текст
        document.getElementById('info').innerHTML = "<h2>" + x.t + "</h2><p>" + x.d + "</p>";
    }
</script>

</body>
</html>
